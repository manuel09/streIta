name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      # choose your default branch
      - master
      - main
    paths-ignore:
      - '*.md'
      - '*.png'
      - '*.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@master
        with:
          ref: "builds"
          path: "builds"
      
      - name: Clean old builds
        run: rm $GITHUB_WORKSPACE/builds/*.cs3

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>/dev/null || echo "Skipping SDK install (may already be present)"

      - name: Access Secrets
        env:
          TMDB_API: ${{ secrets.TMDB_API }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          ILCORSAROVIOLAVERCEL: ${{ secrets.ILCORSAROVIOLAVERCEL }}
          TORBOX_API: ${{ secrets.TORBOX_API }}
        run: |
          cd $GITHUB_WORKSPACE/src
          echo TMDB_API=$TMDB_API >> secrets.properties
          echo SIMKL_CLIENT_ID=$SIMKL_CLIENT_ID >> secrets.properties
          echo ILCORSAROVIOLAVERCEL=$ILCORSAROVIOLAVERCEL >> secrets.properties
          echo TORBOX_API=$TORBOX_API >> secrets.properties

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          export BUILD_COMPLETED_AT_ROME="$(TZ=Europe/Rome date +"%d/%m/%Y %H:%M")"
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
          cp build/plugins.json $GITHUB_WORKSPACE/builds

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0   # do not error if nothing to commit
          git push --force
